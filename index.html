const PROMPT=`Analyse cette facture. Réponds UNIQUEMENT en JSON valide sans markdown.
Format: {"storeName":"...","purchaseDate":"YYYY-MM-DD ou vide","items":[{"name":"...","packaging":"Unité","purchasePriceUnit":0.00}]}

// COMPRESSION IMAGE
const compress=file=>new Promise(res=>{
  const img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{
    const c=document.createElement('canvas'),MAX=1200;
    let w=img.width,h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX}
    if(h>MAX){w=Math.round(w*MAX/h);h=MAX}
    c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    res(c.toDataURL('image/jpeg',0.82).split(',')[1]);
  };
  img.src=url;
});

// PDF → IMAGE
const pdfToImg=async file=>{
  if(typeof pdfjsLib==='undefined')throw new Error("PDF.js non chargé. Vérifiez votre connexion.");
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const pages=[];
  let tw=0,th=0;
  for(let p=1;p<=Math.min(pdf.numPages,3);p++){
    const page=await pdf.getPage(p);
    const vp=page.getViewport({scale:2});
    const c=document.createElement('canvas');
    c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    pages.push(c);th+=vp.height;tw=Math.max(tw,vp.width);
  }
  const mc=document.createElement('canvas');
  mc.width=tw;mc.height=th;
  const ctx=mc.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,tw,th);
  let oy=0;
  for(const c of pages){ctx.drawImage(c,0,oy);oy+=c.height}
  return mc.toDataURL('image/jpeg',0.85).split(',')[1];
};

// APPEL MISTRAL
const callMistral=async(file,key)=>{
  const b64=file.type==='application/pdf'?await pdfToImg(file):await compress(file);
  const payload={
    model:"pixtral-large-latest",max_tokens:2048,
    messages:[{role:"user",content:[
      {type:"image_url",image_url:{url:`data:image/jpeg;base64,${b64}`}},
      {type:"text",text:PROMPT}
    ]}]
  };
  const delays=[2000,5000,10000];
  for(let i=0;i<3;i++){
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),35000);
    try{
      const r=await fetch('https://api.mistral.ai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
        body:JSON.stringify(payload),signal:ctrl.signal
      });
      clearTimeout(t);
      if(r.status===429){if(i<2)await new Promise(r=>setTimeout(r,delays[i]));continue}
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.message||`Erreur ${r.status}`)}
      const d=await r.json();
      let txt=d.choices?.[0]?.message?.content||'';
      txt=txt.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      const parsed=JSON.parse(txt);
      if(!parsed.items?.length)throw new Error("Aucun article détecté.");
      return parsed;
    }catch(e){clearTimeout(t);if(e.name==='AbortError')throw new Error("Délai dépassé (35s). Réessayez.");if(i===2||!e.message?.includes('429'))throw e;}
  }
  throw new Error("Limite de requêtes dépassée. Attendez 1 minute.");
};

// OCR TESSERACT
const runOCR=async(file,onProg)=>{
  const w=await Tesseract.createWorker('fra+eng',1,{logger:m=>{if(m.status==='recognizing text')onProg(Math.round(m.progress*100))}});
  const{data:{text}}=await w.recognize(file);await w.terminate();
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const ignore=/total|tva|remise|sous.total|avoir|escompte|net\s*à\s*payer|montant|solde|htva|tvac|port/i;
  const priceRe=/(\d+[.,]\d{2})/g;
  return lines.filter(l=>!ignore.test(l)).map(l=>{
    const prices=[...l.matchAll(priceRe)].map(m=>parseFloat(m[1].replace(',','.')));
    if(!prices.length)return null;
    const name=l.replace(/[\d.,€*x\-%]+/g,'').replace(/\s+/g,' ').trim();
    return name.length>1?{name,packaging:'Unité',purchasePriceUnit:prices[prices.length-1]}:null;
  }).filter(Boolean);
};

// SWIPE
const Swipe=({children,onRight,onLeft,locked})=>{
  const [sx,setSx]=useState(null),[tx,setTx]=useState(0);
  const start=e=>setSx(e.touches?e.touches[0].clientX:e.clientX);
  const move=e=>{
    if(sx===null)return;
    const d=(e.touches?e.touches[0].clientX:e.clientX)-sx;
    if(locked&&d>0)return;
    if(d>0&&!onRight)return;if(d<0&&!onLeft)return;
    if(Math.abs(d)<140)setTx(d);
  };
  const end=()=>{
    if(sx===null)return;
    if(tx>80&&!locked&&onRight){setTx(220);setTimeout(()=>{onRight();setTx(0)},220)}
    else if(tx<-80&&onLeft){setTx(-220);setTimeout(()=>{onLeft();setTx(0)},220)}
    else setTx(0);setSx(null);
  };
  return(
    <div className="relative overflow-hidden bg-slate-200 rounded-2xl mb-3 shadow-sm select-none">
      {onRight&&<div className={`absolute inset-y-0 left-0 flex items-center pl-5 text-white font-bold bg-green-500 w-full transition-opacity ${tx>0?'opacity-100':'opacity-0'}`}><BCheck s={20} c="mr-2"/>Encaissé</div>}
      {onLeft&&<div className={`absolute inset-y-0 right-0 flex items-center pr-5 text-white font-bold bg-red-500 w-full justify-end transition-opacity ${tx<0?'opacity-100':'opacity-0'}`}><BTrash s={18} c="mr-2"/>Supprimer</div>}
      <div className="relative bg-white rounded-2xl border border-slate-100 transition-transform duration-200" style={{transform:`translateX(${tx}px)`}} onTouchStart={start} onTouchMove={move} onTouchEnd={end} onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}>{children}</div>
    </div>
  );
};

const Stats=({invs,back})=>{
  const [mode,setMode]=useState('month');
  const MO=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const getData=()=>{
    const now=new Date();
    if(mode==='month'){
      return Array.from({length:12},(_,i)=>{
        const d=new Date(now.getFullYear(),now.getMonth()-11+i,1);
        const label=MO[d.getMonth()]+(d.getFullYear()<now.getFullYear()?' '+String(d.getFullYear()).slice(2):'');
        const g=invs.filter(v=>{const dd=new Date(v.date);return dd.getFullYear()===d.getFullYear()&&dd.getMonth()===d.getMonth()}).reduce((a,v)=>a+marge(v).e,0);
        return{label,g:parseFloat(g.toFixed(2))};
      });
    }
    return Array.from({length:5},(_,i)=>{
      const y=now.getFullYear()-4+i;
      const g=invs.filter(v=>new Date(v.date).getFullYear()===y).reduce((a,v)=>a+marge(v).e,0);
      return{label:String(y),g:parseFloat(g.toFixed(2))};
    });
  };
  const data=getData();
  const maxG=Math.max(...data.map(d=>Math.abs(d.g)),1);
  const total=data.reduce((a,d)=>a+d.g,0);
  const nz=data.filter(d=>d.g!==0);
  const avg=nz.length?total/nz.length:0;
  const best=data.reduce((b,d)=>d.g>b.g?d:b,{g:0,label:'—'});
  const BW=mode==='month'?18:36,CH=130,CW=300,bc=data.length,sp=(CW-bc*BW)/(bc+1);
  return(
    <div className="flex flex-col h-full bg-slate-50 text-slate-900">
      <header className="bg-emerald-700 text-white px-4 pt-10 pb-4 flex items-center justify-between rounded-b-3xl">
        <button onClick={back} className="p-2 bg-white/20 rounded-full"><BLeft s={20}/></button>
        <h2 className="font-bold text-lg">Statistiques</h2>
        <div className="w-10"/>
      </header>
      <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-10">
        <div className="bg-white rounded-2xl p-1.5 flex border border-slate-100">
          <button onClick={()=>setMode('month')} className={`flex-1 py-2 rounded-xl text-sm font-bold ${mode==='month'?'bg-emerald-600 text-white':'text-slate-400'}`}>Par mois</button>
          <button onClick={()=>setMode('year')} className={`flex-1 py-2 rounded-xl text-sm font-bold ${mode==='year'?'bg-emerald-600 text-white':'text-slate-400'}`}>Par année</button>
        </div>
        <div className="grid grid-cols-2 gap-3">
          {[['Gain total',total,'emerald'],['Moyenne',avg,'blue'],].map(([l,v,col])=>(
            <div key={l} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
              <p className="text-xs text-slate-400 uppercase font-bold">{l}</p>
              <p className={`text-2xl font-black mt-1 text-${col}-600`}>{v.toFixed(2)} €</p>
            </div>
          ))}
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
            <p className="text-xs text-slate-400 uppercase font-bold">Meilleure période</p>
            <p className="text-lg font-black mt-1 text-slate-800">{best.label}</p>
            <p className="text-xs text-emerald-600 font-bold">{best.g?.toFixed(2)} €</p>
          </div>
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
            <p className="text-xs text-slate-400 uppercase font-bold">Factures</p>
            <p className="text-2xl font-black mt-1 text-slate-800">{invs.length}</p>
          </div>
        </div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
          <p className="text-xs font-bold text-slate-500 uppercase mb-3">{mode==='month'?'12 derniers mois':'5 dernières années'}</p>
          {invs.length===0?(
            <div className="text-center text-slate-400 py-8"><BBar s={40} c="mx-auto mb-3 opacity-30"/><p className="text-sm">Aucune donnée</p></div>
          ):(
            <div className="overflow-x-auto">
              <svg viewBox={`0 0 ${CW} ${CH+30}`} style={{width:'100%',minWidth:'280px'}}>
                {[0,.25,.5,.75,1].map((r,i)=><g key={i}><line x1="0" y1={CH*(1-r)} x2={CW} y2={CH*(1-r)} stroke="#f1f5f9" strokeWidth="1"/><text x="2" y={CH*(1-r)-2} fontSize="7" fill="#94a3b8">{(maxG*r).toFixed(0)}€</text></g>)}
                {data.map((d,i)=>{
                  const x=sp+i*(BW+sp),bh=Math.max(2,(Math.abs(d.g)/maxG)*CH),y=d.g>=0?CH-bh:CH;
                  const col=d.g>0?'#10b981':d.g<0?'#ef4444':'#e2e8f0';
                  return<g key={i}><rect x={x} y={y} width={BW} height={bh} fill={col} rx="3" opacity="0.85"/>
                    {d.g!==0&&<text x={x+BW/2} y={y-3} textAnchor="middle" fontSize="6" fill={col} fontWeight="bold">{d.g>0?'+':''}{d.g.toFixed(0)}</text>}
                    <text x={x+BW/2} y={CH+14} textAnchor="middle" fontSize="7" fill="#64748b">{d.label}</text></g>;
                })}
                <line x1="0" y1={CH} x2={CW} y2={CH} stroke="#cbd5e1" strokeWidth="1"/>
              </svg>
            </div>
          )}
        </div>
        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
          <div className="px-4 py-3 border-b border-slate-50"><p className="text-xs font-bold text-slate-500 uppercase">Détail</p></div>
          {[...data].reverse().filter(d=>d.g!==0).map((d,i)=>(
            <div key={i} className="flex justify-between px-4 py-3 border-b border-slate-50 last:border-0">
              <p className="font-semibold text-slate-700 text-sm">{d.label}</p>
              <p className={`font-black text-sm ${d.g>0?'text-emerald-600':'text-red-500'}`}>{d.g>0?'+':''}{d.g.toFixed(2)} €</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const Simulator=({invs,back})=>{
  const [target,setTarget]=useState(''),[res,setRes]=useState(null);
  const go=()=>{
    const goal=parseFloat(target);if(!goal||goal<=0)return;
    const prods=[];
    invs.forEach(inv=>inv.items.forEach(it=>{const m=(parseFloat(it.pv)||0)-(parseFloat(it.pa)||0);if(m>0)prods.push({...it,m})}));
    if(!prods.length)return alert("Remplissez des prix de vente d'abord.");
    let cur=0,items=prods.map(p=>({...p,qty:0})),n=0;
    while(cur<goal&&n<50000){const p=items[Math.floor(Math.random()*items.length)];p.qty++;cur+=p.m;n++}
    setRes({items:items.filter(i=>i.qty>0),total:cur});
  };
  return(
    <div className="flex flex-col h-full bg-slate-50 text-slate-900">
      <header className="bg-indigo-600 text-white px-4 pt-10 pb-4 flex items-center justify-between">
        <button onClick={back} className="p-2 bg-white/20 rounded-full"><BLeft s={20}/></button>
        <h2 className="font-bold">Simulateur de gain</h2>
        <div className="w-10"/>
      </header>
      <div className="flex-1 overflow-y-auto p-5 space-y-4">
        <div className="bg-white rounded-2xl p-5 border border-slate-100">
          <p className="text-xs font-bold text-slate-400 uppercase mb-3">Gain visé (€)</p>
          <div className="flex gap-2">
            <input type="number" value={target} onChange={e=>setTarget(e.target.value)} placeholder="Ex: 500"
              className="flex-1 bg-slate-50 border border-slate-200 p-3 rounded-xl font-black text-lg focus:ring-2 focus:ring-indigo-500 outline-none"/>
            <button onClick={go} className="bg-indigo-600 text-white px-5 rounded-xl font-bold">Go</button>
          </div>
        </div>
        {res&&(
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-indigo-600 to-purple-700 text-white p-6 rounded-2xl">
              <p className="text-xs opacity-70 mb-1 uppercase">Marge estimée</p>
              <p className="text-4xl font-black">{res.total.toFixed(2)} €</p>
            </div>
            {res.items.map((it,i)=>(
              <div key={i} className="bg-white rounded-2xl p-4 flex justify-between items-center border border-slate-100">
                <div><p className="font-bold text-sm">{it.name}</p><p className="text-xs text-slate-400">+{it.m.toFixed(2)} €/unité</p></div>
                <div className="bg-indigo-50 text-indigo-700 font-black px-4 py-2 rounded-xl border border-indigo-100">x {it.qty}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

                <BChevron s={16} c="text-slate-300 shrink-0"/>
              </div>
            </Swipe>
          );
        })}
        {sorted.length>0&&<p className="text-center text-xs text-slate-400 mt-1">← Glissez : encaisser / supprimer →</p>}
      </div>
      <div className="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-4 py-4 flex gap-2">
        <button onClick={()=>go('simulator')} className="bg-indigo-600 text-white p-3 rounded-2xl shadow"><BTrend s={20}/></button>
        <button onClick={()=>go('stats')} className="bg-emerald-600 text-white p-3 rounded-2xl shadow"><BBar s={20}/></button>
        <button onClick={()=>go('manual')} className="bg-slate-800 text-white p-3 rounded-2xl shadow"><BEdit s={20}/></button>
        <button onClick={()=>go('scanner')} className="flex-1 bg-blue-600 text-white rounded-2xl shadow flex items-center justify-center gap-2 font-bold text-sm py-3">
          <BUpload s={18}/>Scanner
        </button>
      </div>
    </div>
  );
};

// APP
function App(){
  const [view,setView]=useState('dashboard');
  const [sel,setSel]=useState(null);
  const [toDel,setToDel]=useState(null);
  const [invs,setInvs]=useState(load);
  useEffect(()=>save(invs),[invs]);

  const upd=fn=>setInvs(p=>{const n=fn(p);if(sel)setSel(n.find(i=>i.id===sel.id)||null);return n});
  const nav=(v,data)=>{if(data)setSel(data);setView(v)};

  return(
    <div className="flex justify-center items-start min-h-screen bg-slate-300 sm:items-center sm:py-8">
      <div className="relative w-full max-w-sm min-h-screen sm:min-h-0 sm:h-[820px] bg-white overflow-hidden sm:rounded-[40px] sm:border-8 sm:border-slate-900 sm:shadow-2xl">
        <Modal open={!!toDel} title="Supprimer ?" msg="Cette facture sera définitivement effacée."
          onOk={()=>{upd(p=>p.filter(i=>i.id!==toDel));setToDel(null);setView('dashboard')}}
          onCancel={()=>setToDel(null)}/>
        {view==='dashboard'&&<Dashboard invs={invs} go={nav} onMark={id=>upd(p=>p.map(i=>i.id===id?{...i,done:true}:i))} onDel={id=>setToDel(id)}/>}
        {view==='scanner'&&<Scanner back={()=>setView('dashboard')} onSave={inv=>{setInvs(p=>[...p,inv]);setSel(inv);setView('detail')}}/>}
        {view==='manual'&&<Manual back={()=>setView('dashboard')} onSave={inv=>{setInvs(p=>[...p,inv]);setSel(inv);setView('detail')}}/>}
        {view==='settings'&&<Settings back={()=>setView('dashboard')}/>}
        {view==='detail'&&sel&&<Detail inv={sel} back={()=>setView('dashboard')}
          onUpdatePv={(iid,itid,v)=>upd(p=>p.map(inv=>inv.id===iid?{...inv,items:inv.items.map(it=>it.id===itid?{...it,pv:v}:it)}:inv))}
          onDeleteInv={id=>setToDel(id)}
          onDeleteItem={(iid,itid)=>upd(p=>p.map(inv=>inv.id===iid?{...inv,items:inv.items.filter(it=>it.id!==itid)}:inv))}/>}
        {view==='stats'&&<Stats invs={invs} back={()=>setView('dashboard')}/>}
        {view==='simulator'&&<Simulator invs={invs} back={()=>setView('dashboard')}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
